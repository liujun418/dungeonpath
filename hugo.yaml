baseURL: "https://dungeonpath.com/"
title: "DungeonPath"
copyright: "© 2026 DungeonPath"
paginate: 10
theme: PaperMod
enableRobotsTXT: true
enableEmoji: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    label: English
    weight: 1
    title: "DungeonPath"
    params:
      description: "Expert game guides and walkthroughs for Roblox, mobile, and PC games. Detailed tier lists, beginner guides, breeding charts, and strategy tips."

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "Expert game guides and walkthroughs for Roblox, mobile, and PC games. Detailed tier lists, beginner guides, breeding charts, and strategy tips."
  keywords: ["game guides", "Roblox guides", "mobile game guides", "PC game guides", "Monster Legends", "Palworld", "Lethal Company", "My Singing Monsters", "walkthroughs", "tier lists"]
  author: DungeonPath Team
  DateFormat: "January 2, 2006"

  # Social / SEO
  images: ["images/banner.webp"]
  ToggleTheme: true
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: true

  # Assets
  assets:
    favicon: "/favicon.ico"

  # Profile mode (homepage)
  profileMode:
    enabled: true
    title: "DungeonPath"
    subtitle: "Expert guides for Roblox, mobile, and PC games — beginner walkthroughs, tier lists, and strategy tips."
    imageUrl: ""
    imageTitle: "DungeonPath Logo"
    buttons:
      - name: "Browse Guides"
        url: "/posts/"
      - name: "Search Guides"
        url: "/search/"

  # Social links
  socialIcons: []

menu:
  main:
    - name: "Guides"
      url: "/posts/"
      weight: 1
    - name: "Categories"
      url: "/categories/"
      weight: 2
    - name: "Search"
      url: "/search/"
      weight: 3
    - name: "About"
      url: "/about/"
      weight: 4

  footer:
    - name: "Privacy Policy"
      url: "/privacy-policy/"
      weight: 1
    - name: "Terms of Service"
      url: "/terms-of-service/"
      weight: 2
    - name: "Ad Disclosure"
      url: "/ad-disclosure/"
      weight: 3
    - name: "Contact"
      url: "mailto:jzerov@live.com"
      weight: 4

# SEO / Taxonomy
taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true

services:
  googleAnalytics:
    # Will be added later when GA is set up
    # ID: "G-XXXXXXXXXX"
