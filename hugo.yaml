baseURL: "https://dungeonpath.com/"
title: "DungeonPath"
copyright: "© 2026 DungeonPath"
paginate: 10
theme: PaperMod
enableRobotsTXT: true
enableEmoji: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    label: English
    weight: 1
    locale: en-us
    title: "DungeonPath — Free Game Guides & Walkthroughs"
    params:
      description: "Expert game guides and walkthroughs for Roblox, mobile, and PC games. Detailed tier lists, beginner guides, breeding charts, and strategy tips."

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "Expert game guides and walkthroughs for Roblox, mobile, and PC games. Detailed tier lists, beginner guides, breeding charts, and strategy tips."
  mainSections: ["posts"]
  keywords: ["game guides", "Roblox guides", "mobile game guides", "PC game guides", "Monster Legends", "Palworld", "Lethal Company", "My Singing Monsters", "walkthroughs", "tier lists", "how to breed", "beginner guide", "best weapons", "monster guide", "boss guide", "strategy guide", "free game guide", "game walkthrough 2026"]
  author: DungeonPath Team
  DateFormat: "January 2, 2006"

  # Social / SEO
  images: ["images/banner.webp"]
  ToggleTheme: true
  ShowReadingTime: true
  ShowWordCount: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: true

  # Logo text — keep short, SEO title stays long
  label:
    text: "DungeonPath"

  # Assets
  assets:
    favicon: "/favicon.ico"

  # Profile mode (homepage)
  profileMode:
    enabled: true
    title: "DungeonPath"
    subtitle: "Expert guides for Roblox, mobile, and PC games — beginner walkthroughs, tier lists, and strategy tips."
    imageUrl: ""
    imageTitle: "DungeonPath Logo"
    buttons:
      - name: "Browse Guides"
        url: "/posts/"
      - name: "Search Guides"
        url: "/search/"

  # Social links
  socialIcons: []

menu:
  main:
    - name: "Guides"
      url: "/posts/"
      weight: 1
    - name: "Games"
      url: "/games/"
      weight: 2
    - name: "Categories"
      url: "/categories/"
      weight: 3
    - name: "Search"
      url: "/search/"
      weight: 4
    - name: "About"
      url: "/about/"
      weight: 5

  footer:
    - name: "Privacy Policy"
      url: "/privacy-policy/"
      weight: 1
    - name: "Terms of Service"
      url: "/terms-of-service/"
      weight: 2
    - name: "Refund Policy"
      url: "/refund-policy/"
      weight: 3
    - name: "Ad Disclosure"
      url: "/ad-disclosure/"
      weight: 4
    - name: "About"
      url: "/about/"
      weight: 5
    - name: "Contact"
      url: "mailto:jzerov@live.com"
      weight: 6

# SEO / Taxonomy
taxonomies:
  category: categories
  tag: tags
  game: games

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true

services:
  googleAnalytics:
    ID: "G-L7Q1TVWTTV"

# Site verification
verify:
  google: "nKpCprzOhJQoVYhA5Ewb6yvJwiEIBdcnpiIE2DJ0Q4Q"
  bing: ""
