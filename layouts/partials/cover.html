{{- with .cxt}} {{/* Apply proper context from dict */}}
{{- if (and .Params.cover.image (not $.isHidden)) }}
<figure class="entry-cover">
    {{- $loading := cond $.IsSingle "eager" "lazy" }}
    {{- $addLink := (and site.Params.cover.linkFullImages $.IsSingle) }}
    {{- $prod := (hugo.IsProduction | or (eq site.Params.env "production")) }}
    {{- $alt := (.Params.cover.alt | default .Params.cover.caption | plainify) }}

    {{- /* Match cover image in Hugo resources (assets/) by directory slug + filename */}}
    {{- $coverPath := .Params.cover.image }}
    {{- $coverDir := strings.TrimPrefix "/" (path.Dir $coverPath) }}
    {{- $coverResourcePath := printf "%s/cover.png" $coverDir }}
    {{- $cover := resources.Get $coverResourcePath }}

    {{- $sizes := (slice "360" "480" "720" "1080" "1500") }}
    {{- $processableFormats := (slice "jpg" "jpeg" "png" "tif" "bmp" "gif") -}}
    {{- if hugo.IsExtended -}}
        {{- $processableFormats = $processableFormats | append "webp" -}}
    {{- end }}

    {{- $imgdl := (.Params.cover.image) | absURL }}
    {{- if $cover -}}
        {{- $imgdl = $cover.Permalink }}
    {{- end }}

    {{- if $addLink }}
        <a href="{{ $imgdl }}" target="_blank" rel="noopener noreferrer">
    {{- end }}

    {{- if $cover -}}
        {{- if (and (in $processableFormats $cover.MediaType.SubType) (eq $prod true)) }}
            <img loading="{{ $loading }}"
                srcset='{{- range $size := $sizes -}}
                            {{- if (ge $cover.Width $size) }}
                                {{- printf "%s %s" (($cover.Resize (printf "%sx webp" $size)).Permalink) (printf "%sw," $size) }}
                            {{- end }}
                        {{- end }}
                        {{- printf "%s %dw" ($cover.Permalink) ($cover.Width) }}'
                src="{{ ($cover.Resize "720x webp").Permalink }}"
                sizes="(max-width: 600px) 100vw, (max-width: 900px) 50vw, 720px"
                width="{{ $cover.Width }}" height="{{ $cover.Height }}"
                alt="{{ $alt }}" decoding="async">
        {{- else }}
            <img loading="{{ $loading }}" src="{{ $imgdl }}" alt="{{ $alt }}" decoding="async" sizes="(max-width: 600px) 100vw, (max-width: 900px) 50vw, 720px">
        {{- end }}
    {{- else }}
        <img loading="{{ $loading }}" src="{{ $imgdl }}" alt="{{ $alt }}" decoding="async" sizes="(max-width: 600px) 100vw, (max-width: 900px) 50vw, 720px">
    {{- end }}

    {{- if $addLink }}
        </a>
    {{- end }}
</figure>
{{- end }}
{{- end -}}
