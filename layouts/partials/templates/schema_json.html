{{- /* Override theme: only Organization on homepage. Article + BreadcrumbList handled by custom partials. */}}
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": {{ site.Title }},
  "url": {{ site.Home.Permalink }},
  "description": {{ site.Params.description | plainify | truncate 180 }},
  "logo": {{ site.Params.assets.favicon | default "favicon.ico" | absURL }},
  "sameAs": []
}
</script>
{{- end }}
