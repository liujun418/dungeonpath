{{- $page := . }}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": { "@type": "Organization", "name": "DungeonPath" },
  "publisher": { "@type": "Organization", "name": "DungeonPath", "url": "{{ .Site.BaseURL }}" },
  "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ .Permalink }}" },
  {{- if .Params.cover.image }}
  "image": "{{ .Site.BaseURL }}{{ .Params.cover.image }}",
  {{- end }}
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ .Site.BaseURL }}" },
    { "@type": "ListItem", "position": 2, "name": "Guides", "item": "{{ .Site.BaseURL }}posts/" },
    {{- if .Params.games }}
    { "@type": "ListItem", "position": 3, "name": "{{ index .Params.games 0 }}", "item": "{{ .Site.BaseURL }}games/{{ index .Params.games 0 | urlize }}/" },
    { "@type": "ListItem", "position": 4, "name": "{{ .Title }}", "item": "{{ .Permalink }}" }
    {{- else }}
    { "@type": "ListItem", "position": 3, "name": "{{ .Title }}", "item": "{{ .Permalink }}" }
    {{- end }}
  ]
}
</script>
{{- end }}
